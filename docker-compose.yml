services:
  # Run the full test suite
  test:
    build:
      context: .
      target: test
    command: mix test --trace

  # Interactive shell for debugging
  dev:
    build:
      context: .
      target: app-builder
    command: iex -S mix
    stdin_open: true
    tty: true
    volumes:
      - zvec-data:/var/data/zvec

volumes:
  zvec-data:
