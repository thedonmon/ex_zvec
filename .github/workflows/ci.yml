name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  CACHE_IMAGE: ghcr.io/${{ github.repository }}/cache

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Uses GHCR as a remote layer cache — the zvec C++ build (Arrow,
      # RocksDB, protobuf, etc.) is cached across CI runs. First run is
      # slow (~15 min), subsequent runs only rebuild Elixir/Rust changes.
      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          load: true
          tags: ex_zvec-test:latest
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }}:buildcache,mode=max

      - name: Run tests
        run: docker run --rm ex_zvec-test:latest mix test --trace
